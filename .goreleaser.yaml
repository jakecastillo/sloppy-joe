version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sloppy
    main: ./cmd/sloppy
    binary: sloppy
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/sloppyjoe/sloppy.Version={{ .Version }}
  - id: sloppyd
    main: ./cmd/sloppyd
    binary: sloppyd
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/sloppyjoe/sloppy.Version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: git

sboms:
  - artifacts: archive

# Keyless cosign signature over the checksums file (covers every artifact).
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
