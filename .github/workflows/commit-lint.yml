name: Commit Lint

on:
  pull_request:

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit subjects (Conventional Commits)
        run: |-
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .+'
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            subject=$(git log -1 --format=%s "$sha")
            case "$subject" in
              "Merge "*|"Revert "*|"fixup! "*|"squash! "*) continue ;;
            esac
            if ! printf '%s' "$subject" | grep -Eq "$pattern"; then
              echo "::error::Non-conventional commit $sha: $subject"
              fail=1
            fi
            if git log -1 --format=%B "$sha" | grep -Eiq '^co-authored-by:[[:space:]]*claude|claude\.com/claude-code|^🤖[[:space:]]*generated with'; then
              echo "::error::AI co-author/generated-by trailer in $sha — remove it"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "See docs/conventional-commits.md"
            exit 1
          fi
