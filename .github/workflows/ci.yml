name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "::error::unformatted files:"; echo "$out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      # Run golangci-lint exactly as verified locally (v2 config in .golangci.yml).
      # Swap for golangci/golangci-lint-action for faster caching once a SHA is pinned.
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build (static, cgo-free)
        env:
          CGO_ENABLED: "0"
        run: go build ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
