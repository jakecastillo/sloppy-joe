name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "::error::unformatted files:"; echo "$out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      # Pinned version (no @latest drift); v2 config in .golangci.yml.
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: coverage floor (>= 72%)
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 72) ? 0 : 1 }' \
            || { echo "::error::coverage ${pct}% is below the 72% floor"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build (static, cgo-free)
        env:
          CGO_ENABLED: "0"
        run: go build ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
