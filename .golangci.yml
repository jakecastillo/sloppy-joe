version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    # Allow the idiomatic unchecked defer Close()/Write() etc.
    presets:
      - std-error-handling
    rules:
      # Tests may ignore errors on best-effort setup/teardown helpers.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
