# Local end-to-end stack: Ollama (local model) + LiteLLM (gateway) + Redis
# (state) + sloppyd (the control loop). No provider keys required.
#
#   docker compose up -d --build
#   # API auth is on (bind guard requires it on a public bind); pass the dev key:
#   curl -H 'X-API-Key: dev' -XPOST localhost:8723/v1/signals -d @examples/signals/cost-spike.json
#   curl -H 'X-API-Key: dev' localhost:8723/status   # /healthz stays public
#   SLOPPY_E2E_BASE=http://localhost:8723 SLOPPY_E2E_API_KEY=dev go test -tags integration ./test/e2e/...
services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on: [ollama]
    ports: ["4000:4000"]
    volumes:
      - ./deploy/litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  sloppyd:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    ports: ["8723:8723"]
    environment:
      SLOPPY_LITELLM_URL: http://litellm:4000
      # Secret indirection (no live token committed): resolved from the host env /
      # .env file with a throwaway dev fallback. In production prefer the broker's
      # file form, SLOPPY_TOKEN_LITELLM_FILE, pointing at a mounted /run/secrets file.
      SLOPPY_TOKEN_LITELLM: ${SLOPPY_TOKEN_LITELLM:-sk-sloppy-dev}
      # The container's :8723 bind is network-reachable (port-mapped to the host), so
      # sloppyd's bind guard requires --auth. Supply a throwaway dev api key with both
      # scopes; override SLOPPY_API_KEYS / SLOPPY_E2E_API_KEY for anything real.
      SLOPPY_API_KEYS: ${SLOPPY_API_KEYS:-dev=ingest:write,status:read}
    command:
      - "--addr"
      - ":8723"
      - "--auth"
      - "--rules"
      - "/app/examples/rules"
      - "--store"
      - "redis"
      - "--redis-addr"
      - "redis:6379"
      - "--db"
      - "/data/sloppy.db"
      - "--key"
      - "/data/sloppy.key"
      - "--log-format"
      - "json"
    volumes:
      - sloppydata:/data

volumes:
  ollama:
  sloppydata:
